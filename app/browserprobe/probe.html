<!doctype html>
<html>
<head><meta charset="utf-8"><title>fbx webkit fingerprint</title></head>
<body style="background:#101018;color:#3f6;font-family:monospace;font-size:18px">
<h2>WebKit engine fingerprint</h2>
<pre id="out">running…</pre>
<script>
// Feature-detection non destructif pour borner la version réelle du moteur WebKit.
// Matériel possédé — documentation de surface d'attaque.
var out = document.getElementById('out');
function beacon(tag, val){
  try { var i = new Image();
    i.src = "/REPORT?" + tag + "=" + encodeURIComponent(String(val)).slice(0,200) + "&t=" + Date.now();
  } catch(e){}
  out.textContent += "\n" + tag + ": " + val;
}

beacon("ua", navigator.userAgent);

// Marqueurs de version (Safari) :
var feats = {
  // présents dès ~15.4 → attendus si >= 16.0
  structuredClone:   typeof structuredClone === "function",
  findLast:          !!Array.prototype.findLast,
  // introduits en 16.4 → ABSENTS si moteur figé à 16.0-16.3
  toSorted:          !!Array.prototype.toSorted,
  toSpliced:         !!Array.prototype.toSpliced,
  arrayWith:         !!Array.prototype.with,
  fromAsync:         typeof Array.fromAsync === "function",
  reportError:       typeof reportError === "function",
  offscreenCanvas:   typeof OffscreenCanvas === "function",
  // ~17.0
  regexpVflag:       (function(){ try { new RegExp("[\\p{L}]","v"); return true; } catch(e){ return false; } })(),
  // primitives utiles à l'exploitation
  wasm:              typeof WebAssembly === "object",
  wasmInstance:      (function(){ try { return !!new WebAssembly.Module(new Uint8Array([0,97,115,109,1,0,0,0])); } catch(e){ return false; } })(),
  sharedArrayBuffer: typeof SharedArrayBuffer === "function",
  bigInt64Array:     typeof BigInt64Array === "function"
};
for (var k in feats) beacon("feat_" + k, feats[k]);

// Estimation de borne
var v = "16.0-16.3";
if (feats.toSorted || feats.fromAsync) v = ">=16.4";
if (feats.regexpVflag) v = ">=17.0";
beacon("engine_estimate", v);
beacon("done", "1");
</script>
</body>
</html>
